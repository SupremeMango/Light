<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light - Final Refined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@700&family=DM+Sans:wght@400;700&display=swap');
        
        :root {
            scrollbar-gutter: stable; /* Prevents UI jumping when scrollbar appears */
            scrollbar-width: none;
        }

        .font-gog { font-family: "Google Sans", sans-serif; }
        .font-dms { font-family: "DM Sans", sans-serif; }

        /* Smooth Dropdown Logic */
        #favorites-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #favorites-content.is-open { grid-template-rows: 1fr; }
        .inner-overflow { overflow: hidden; }

        /* Hide Swiper when not in use to reclaim space */
        .swiper-hidden { display: none !important; }

        /* Heart Animation */
        @keyframes heart-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .is-favorite svg { fill: #ef4444; stroke: #ef4444; animation: heart-pop 0.4s ease-out; }
        .is-favorite { background: white !important; color: #ef4444 !important; }

        /* Swiper Dots */
        .swiper-pagination-bullet-active { background: #ef4444 !important; }
        .swiper { padding-bottom: 40px !important; margin-top: 10px; }

        /* Hide Scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Top bar, Favorite -->
        <div class="mb-12 border border-gray-100 rounded-3xl bg-gray-50/50 overflow-hidden shadow-sm">  
            <div onclick="toggleDropdown()" class="flex items-center gap-2 p-6 cursor-pointer group select-none"> 
                <h2 class="text-lg md:text-2xl font-bold flex items-center gap-2 font-gog">
                    <span class="text-red-500 text-base md:text-xl">❤️</span> Your Favorites 
                    <span id="fav-count" class="ml-1 md:ml-2 text-sm md:text-lg font-bold bg-white px-2 md:px-3 py-0.5 md:py-1 rounded-full text-gray-500 shadow-sm border border-gray-100">
                        0
                    </span>
                </h2>
                
                <svg id="dropdown-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </div>

            <div id="favorites-content">
                <div class="inner-overflow">
                    <div id="empty-state" class="px-8 pb-8 text-gray-400 text-sm font-dms italic">
                        Click the heart on any card to add it to your favorites.
                    </div>
                    
                    <div class="swiper mySwiper px-8 swiper-hidden no-scrollbar">
                        <div class="swiper-wrapper" id="favorites-wrapper">
                            </div>
                        <div class="swiper-pagination"></div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-8 font-mono border-l-4 border-black pl-4">Gallery</h2>

        <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            
            <div class="relative overflow-hidden rounded-2xl bg-gray-100 group cursor-pointer aspect-[3/4]" data-id="card1" data-link="https://global.novelpia.com/novel/679">
                <img src="https://img.kfcok.net/covers/77556a41c2c0e6d47c3d33aa2863b76a21b64999/cover.png" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-6 opacity-0 group-hover:opacity-100 transition-all duration-300">
                    <h3 class="text-white text-lg font-bold font-gog">The Tyrant Loves Me</h3>
                    <p class="text-gray-300 text-xs font-dms">Digital Collection</p>
                </div>
                <button onclick="toggleFavorite(this)" class="heart-btn absolute top-4 right-4 z-20 p-2.5 rounded-full bg-white/20 backdrop-blur-md text-white transition-all duration-300 hover:bg-white/40">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 pointer-events-none"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
                </button>
            </div>

            <div class="relative overflow-hidden rounded-2xl bg-gray-100 group cursor-pointer aspect-[3/4]" data-id="card2" data-link="https://global.novelpia.com/novel/3383">
                <img src="https://img.kfcok.net/covers/db2b6bcbd413fbd40df064755c6b96d56b2b2818/cover.jpeg" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-6 opacity-0 group-hover:opacity-100 transition-all duration-300">
                    <h3 class="text-white text-lg font-bold font-gog">Unknown World</h3>
                    <p class="text-gray-300 text-xs font-dms">Concept Art</p>
                </div>
                <button onclick="toggleFavorite(this)" class="heart-btn absolute top-4 right-4 z-20 p-2.5 rounded-full bg-white/20 backdrop-blur-md text-white transition-all duration-300 hover:bg-white/40">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 pointer-events-none"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
                </button>
            </div>

            <div class="relative overflow-hidden rounded-2xl bg-gray-100 group cursor-pointer aspect-[3/4]" data-id="card2" data-link="https://global.novelpia.com/novel/3383">
                <img src="https://img.kfcok.net/covers/db2b6bcbd413fbd40df064755c6b96d56b2b2818/cover.jpeg" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-6 opacity-0 group-hover:opacity-100 transition-all duration-300">
                    <h3 class="text-white text-lg font-bold font-gog">Unknown World</h3>
                    <p class="text-gray-300 text-xs font-dms">Concept Art</p>
                </div>
                <button onclick="toggleFavorite(this)" class="heart-btn absolute top-4 right-4 z-20 p-2.5 rounded-full bg-white/20 backdrop-blur-md text-white transition-all duration-300 hover:bg-white/40">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 pointer-events-none"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
                </button>
            </div>

            <div class="relative overflow-hidden rounded-2xl bg-gray-100 group cursor-pointer aspect-[3/4]" data-id="card2" data-link="https://global.novelpia.com/novel/3383">
                <img src="https://img.kfcok.net/covers/db2b6bcbd413fbd40df064755c6b96d56b2b2818/cover.jpeg" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-6 opacity-0 group-hover:opacity-100 transition-all duration-300">
                    <h3 class="text-white text-lg font-bold font-gog">Unknown World</h3>
                    <p class="text-gray-300 text-xs font-dms">Concept Art</p>
                </div>
                <button onclick="toggleFavorite(this)" class="heart-btn absolute top-4 right-4 z-20 p-2.5 rounded-full bg-white/20 backdrop-blur-md text-white transition-all duration-300 hover:bg-white/40">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 pointer-events-none"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
                </button>
            </div>

        </div>
        
        <!-- Pop up when hold for 1s -->
        <div id="copy-popup" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
            <div class="bg-white rounded-2xl p-6 w-80 shadow-2xl transform transition-all scale-95 opacity-0 duration-300" id="popup-content">
                <div class="text-center">
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-indigo-100 text-indigo-600 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900">Copy URL?</h3>
                    <p class="text-sm text-gray-500 mt-2">Would you like to copy the image link to your clipboard?</p>
                </div>
                
                <div class="mt-6 flex gap-3">
                    <button onclick="closePopup()" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition-colors">
                        Cancel
                    </button>
                    <button id="confirm-copy" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">
                        Yes, Copy
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../control/index.js"></script>
</body>
</html>
